services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: navon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: navon
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navon -d navon"]
      interval: 5s
      timeout: 5s
      retries: 20

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    expose:
      - "3002"
    environment:
      DATABASE_URL: postgresql://navon:${POSTGRES_PASSWORD}@postgres:5432/navon
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      EMAIL_FROM: ${EMAIL_FROM:-noreply@navonworld.com}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY:-dummy}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - portal
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
