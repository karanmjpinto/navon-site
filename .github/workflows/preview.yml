name: Preview Deploy (staging)

on:
  push:
    branches: [staging]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        run: npx wrangler pages deploy dist/ --project-name navon-site --branch staging

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 5941a833c5655b4a33d15f2155cdb3c3

      - name: Show preview URL
        run: |
          echo "### Staging preview deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Latest staging build is live at: https://staging.navon-site.pages.dev" >> "$GITHUB_STEP_SUMMARY"
