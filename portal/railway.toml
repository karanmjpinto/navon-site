# Railway service config for navon-portal.
# Root directory in Railway dashboard must be set to: portal
# Pair this service with the timescale/timescaledb-ha Postgres service
# in the same Railway project (see deploy/railway/postgres.Dockerfile).
#
# https://docs.railway.app/reference/config-as-code

[build]
  dockerfilePath = "Dockerfile"

[deploy]
  # entrypoint.sh runs migrations then starts Next.js on $PORT
  startCommand    = "sh scripts/entrypoint.sh"
  healthcheckPath = "/api/health"
  # Give migrations time to finish on first cold boot
  healthcheckTimeout = 120
  restartPolicyType  = "ON_FAILURE"
  restartPolicyMaxRetries = 5
  numReplicas = 1
